    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 基礎樣式設定 */
        body {
            background-color: #2e3444; /* 深色底 */
            color: rgba(255, 255, 255, 0.8);
            font-family: "Source Sans Pro", "Microsoft JhengHei", sans-serif;
            margin: 0;
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* Header 導覽列 */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5em 3em;
            background-color: #2e3444;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #header h1.major {
            font-size: 1.2rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        #header a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }

        /* 內容容器 */
        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 4em 2em;
        }

        .inner {
            text-align: center;
        }

        h1, h2, h3 {
            color: #ffffff;
            letter-spacing: 2px;
        }

        .title-section {
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 2em;
            margin-bottom: 3em;
            text-align: left;
        }

        /* 何倫碼內容區塊 */
        .holland-result {
            background-color: #353b4d;
            padding: 3em;
            border-radius: 4px;
            margin-bottom: 3em;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .highlight-box {
            color: #f39c12; /* 橘金色強調 */
            font-weight: bold;
            font-size: 1.4rem;
            margin: 1.5em 0;
        }

        .type-desc {
            margin: 1em 0;
            font-size: 1rem;
        }

        /* 模擬圖片中的結果圖與表格 */
        .result-image {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 2em 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 連結按鈕樣式 */
        .special-link {
            display: inline-flex;
            align-items: center;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .special-link i {
            background: rgba(255,255,255,0.2);
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 10px;
        }

        /* --- 選單彈窗樣式 (圖片一) --- */
        #menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(46, 52, 68, 0.9);
            display: none; /* 預設隱藏 */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .menu-modal {
            background-color: #516496;
            width: 320px;
            padding: 40px 30px;
            border-radius: 4px;
            position: relative;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .menu-modal h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 15px;
        }

        .menu-links {
            list-style: none;
            padding: 0;
        }

        .menu-links li {
            margin: 15px 0;
        }

        .menu-links a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .menu-links a:hover {
            opacity: 0.7;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }
        /* 右上角固定 Menu 連結 */
.menu-nav {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
}

.menu-link {
    background-color: var(--card-blue);
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 4px;
    font-weight: bold;
    border: 1px solid rgba(255, 255, 255, 0.2);

}

.menu-link:hover {

}

}

}

/* 標題旁的返回小連結 */
.back-link {

    text-decoration: none;
    margin-left: 15px;
    font-weight: normal;
}

.back-link:hover {
    color: white;
}
    </style>

    <section class="wrapper">
        <div class="title-section">
            <h1>興趣何倫碼測驗結果</h1>
            <p>HOLLAND 興趣測驗將人與環境分成六大類型：R實作型、I研究型、A藝術型、S社會型、E企業型、C事務型</p>
            <a href="https://guide.104.com.tw/interest/?utm_source=104&utm_medium=guide_mainpage" class="special-link"><i class="fas fa-chevron-right"></i> 點擊這裡測出你的 HOLLAND 碼</a>
        </div>

        <div class="inner">
            <section class="holland-result">
                <div class="highlight-box">我的HOLLAND碼類型為：C事務型 & I研究型</div>
                
                <div class="type-desc">
                    <p><strong>C事務型：</strong>個性謹慎，做事講求規矩和精確。喜歡在有清楚規範的環境下工作</p>
                    <p><strong>I研究型：</strong>善於觀察、思考、分析與推理，喜歡用頭腦依自己的步調來解決問題，並追根究底</p>
                </div>

                <img src="img/高斯.png" alt="何倫碼雷達圖" class="result-image">

        function toggleMenu() {
            const menu = document.getElementById('menu-overlay');
            if (menu.style.display === 'flex') {

            } else {
                menu.style.display = 'flex';
            }
        }
